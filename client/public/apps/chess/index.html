<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess · ChatBridge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#13131f;--surface-2:#1a1a2e;--border:rgba(255,255,255,0.07);
  --accent:#6366f1;--accent-glow:rgba(99,102,241,0.25);--gold:#f59e0b;--gold-dim:rgba(245,158,11,0.15);
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
  --sq-light:#e8d5b0;--sq-dark:#b58863;--sq-sel:rgba(246,246,105,0.7);
  --sq-last-from:rgba(246,246,105,0.5);--sq-last-to:rgba(246,246,105,0.35);
  --sq-check:#e74c3c;--radius:10px;--shadow:0 8px 32px rgba(0,0,0,0.6);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;line-height:1.5;overflow:hidden}
#app{display:flex;height:100vh;overflow:hidden}
#board-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 12px 20px 20px;gap:6px;flex-shrink:0}
#coord-row{display:flex;align-items:stretch}
#rank-labels{display:flex;flex-direction:column;justify-content:space-around;
  width:18px;padding-right:4px}
.rank-label{display:flex;align-items:center;justify-content:flex-end;
  color:var(--text-muted);font-size:11px;font-weight:500}
#board{display:grid;grid-template-columns:repeat(8,var(--sq-px));
  grid-template-rows:repeat(8,var(--sq-px));
  border:3px solid rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;
  box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,0.04)}
#file-labels{display:flex;justify-content:space-around;margin-left:22px;padding-top:4px}
.file-label{color:var(--text-muted);font-size:11px;font-weight:500;text-align:center}
.square{width:var(--sq-px);height:var(--sq-px);display:flex;align-items:center;
  justify-content:center;cursor:pointer;position:relative;transition:filter 0.08s;user-select:none}
.square.light{background:var(--sq-light)}.square.dark{background:var(--sq-dark)}
.square.selected{background:var(--sq-sel)!important}
.square.last-from{background:var(--sq-last-from)!important}
.square.last-to{background:var(--sq-last-to)!important}
.square.in-check{background:var(--sq-check)!important}
.square:hover:not(.selected){filter:brightness(1.1)}
.square.legal-move::after{content:'';position:absolute;width:32%;height:32%;
  background:rgba(0,0,0,0.22);border-radius:50%;pointer-events:none;z-index:2}
.square.legal-capture::after{content:'';position:absolute;inset:0;border-radius:50%;
  border:4px solid rgba(0,0,0,0.22);background:transparent;pointer-events:none;z-index:2}
#promo-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:100;align-items:center;justify-content:center}
#promo-modal.open{display:flex}
#promo-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:var(--shadow)}
#promo-box h3{color:var(--text);font-size:15px;font-weight:600}
#promo-choices{display:flex;gap:8px}
.promo-btn{width:64px;height:64px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color 0.15s,background 0.15s}
.promo-btn:hover{border-color:var(--accent);background:var(--accent-glow)}
.piece{width:88%;height:88%;pointer-events:none;position:relative;z-index:1;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4))}
#side-panel{flex:1;min-width:0;display:flex;flex-direction:column;
  padding:20px 20px 20px 12px;overflow:hidden;gap:0}
#panel-header{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
#panel-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em;
  display:flex;align-items:center;gap:8px}
#panel-title svg{color:var(--accent)}
#players{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;flex-shrink:0}
.player-card{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  transition:border-color 0.2s,background 0.2s}
.player-card.active-turn{border-color:var(--accent);background:rgba(99,102,241,0.08)}
.player-card.active-turn .player-name{color:var(--text)}
.player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.player-avatar.white{background:rgba(240,234,214,0.15)}
.player-avatar.black{background:rgba(26,26,26,0.6);border:1px solid rgba(255,255,255,0.1)}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:600;color:var(--text-dim);transition:color 0.2s}
.player-captured{font-size:14px;line-height:1;min-height:18px;color:var(--text-muted);
  display:flex;flex-wrap:wrap;gap:1px}
.player-captured svg{width:16px;height:16px}
.player-turn-badge{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.05em;color:var(--accent);opacity:0;transition:opacity 0.2s}
.player-card.active-turn .player-turn-badge{opacity:1}
#status-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  margin-bottom:14px;flex-shrink:0;min-height:42px}
#status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background 0.3s}
#status-dot.check{background:var(--gold);box-shadow:0 0 6px var(--gold)}
#status-dot.end{background:#ef4444}
#status-dot.info{background:var(--accent)}
#status-text{font-size:13px;color:var(--text-dim);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#history-section{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;overflow:hidden}
#history-label{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.06em;color:var(--text-muted);flex-shrink:0}
#move-history{flex:1;overflow-y:auto;background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;padding:8px;font-size:12.5px;
  font-family:'JetBrains Mono','Fira Code',monospace;color:var(--text-dim);line-height:1.8;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#move-history::-webkit-scrollbar{width:4px}
#move-history::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.move-pair{display:flex;gap:4px}
.move-num{color:var(--text-muted);min-width:28px}
.move-san{color:var(--text-dim);min-width:52px}
.move-san.latest{color:var(--text);font-weight:600}
#buttons{display:flex;flex-direction:column;gap:6px;margin-top:14px;flex-shrink:0}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);
  border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;
  transition:background 0.15s,border-color 0.15s,color 0.15s;font-family:inherit;min-height:38px}
.btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);color:var(--text)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4f46e5;border-color:#4f46e5}
.btn.danger{border-color:rgba(239,68,68,0.3);color:#ef4444}
.btn.danger:hover{background:rgba(239,68,68,0.1);border-color:#ef4444}
.btn.teach-active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn-row{display:flex;gap:6px}.btn-row .btn{flex:1}
#teach-badge{display:none;align-items:center;gap:6px;padding:6px 10px;
  background:var(--gold-dim);border:1px solid rgba(245,158,11,0.3);border-radius:6px;
  font-size:12px;color:var(--gold);font-weight:600}
#teach-badge.visible{display:flex}
@media(max-width:640px){
  #app{flex-direction:column;overflow-y:auto}
  #board-col{padding:16px 16px 8px}
  #side-panel{padding:8px 16px 16px;overflow:visible}
  #history-section{max-height:140px}
}
</style>
</head>
<body>
<div id="promo-modal" role="dialog" aria-modal="true">
  <div id="promo-box">
    <h3>Promote pawn to:</h3>
    <div id="promo-choices"></div>
  </div>
</div>
<div id="app">
  <div id="board-col">
    <div id="board-wrapper">
      <div id="coord-row">
        <div id="rank-labels"></div>
        <div id="board"></div>
      </div>
      <div id="file-labels"></div>
    </div>
  </div>
  <div id="side-panel">
    <div id="panel-header">
      <div id="panel-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2h6l-1 7H10L9 2z"/><path d="M5 9h14l-2 9H7L5 9z"/><rect x="7" y="18" width="10" height="4" rx="1"/></svg>
        Chess
      </div>
      <div id="teach-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Teach Me
      </div>
    </div>
    <div id="players">
      <div class="player-card" id="card-black">
        <div class="player-avatar black">♟</div>
        <div class="player-info">
          <div class="player-name">Black</div>
          <div class="player-captured" id="captured-by-white"></div>
        </div>
        <div class="player-turn-badge">To move</div>
      </div>
      <div class="player-card" id="card-white">
        <div class="player-avatar white">♙</div>
        <div class="player-info">
          <div class="player-name">White</div>
          <div class="player-captured" id="captured-by-black"></div>
        </div>
        <div class="player-turn-badge">To move</div>
      </div>
    </div>
    <div id="status-bar">
      <div id="status-dot"></div>
      <div id="status-text">White to move</div>
    </div>
    <div id="history-section">
      <div id="history-label">Move History</div>
      <div id="move-history"></div>
    </div>
    <div id="buttons">
      <div class="btn-row">
        <button class="btn primary" onclick="handleNewGame()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          New Game
        </button>
        <button class="btn" onclick="flipBoard()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Flip
        </button>
      </div>
      <button class="btn" id="teach-me-btn" onclick="toggleTeachMe()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Teach Me Mode: OFF
      </button>
      <button class="btn danger" onclick="handleResign()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        Resign
      </button>
    </div>
  </div>
</div>

// ─── State ────────────────────────────────────────────────────────────────
let chess = new Chess();
let boardFlipped = false;
let selectedSquare = null;
let legalMovesForSelected = [];
let lastMoveSquares = [];
let gameOver = false;
let teachMeMode = false;
let sessionId = null;
let pluginId = 'chess';
let conversationId = null;
let registeredOrigin = null;
let pendingPromotion = null;

// ─── Responsive sizing ────────────────────────────────────────────────────
function calcSqSize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  if (vw < 640) return Math.max(36, Math.floor(Math.min(vw - 52, vh * 0.45) / 8));
  return Math.max(44, Math.min(70, Math.floor((vw * 0.52 - 52) / 8), Math.floor((vh - 80) / 8)));
}
function applySqSize() {
  const sq = calcSqSize();
  document.documentElement.style.setProperty('--sq-px', sq + 'px');
  document.querySelectorAll('.rank-label').forEach(el => el.style.height = sq + 'px');
  document.querySelectorAll('.file-label').forEach(el => el.style.width = sq + 'px');
}
window.addEventListener('resize', () => { applySqSize(); renderBoard(); });

// ─── FEN validation ───────────────────────────────────────────────────────
function isValidFen(fen) {
  if (typeof fen !== 'string' || !fen.trim()) return false;
  try { const t = new Chess(fen); return !!t.fen(); } catch(e) { return false; }
}

// ─── Structured state model ───────────────────────────────────────────────
function buildChessState(partial) {
  const history = chess.history({ verbose: true });
  const lastMove = history.length > 0 ? history[history.length - 1] : null;
  return {
    type: 'chess', fen: chess.fen(),
    turn: chess.turn() === 'w' ? 'white' : 'black',
    moveHistory: chess.history(), status: getGameStatus(),
    lastMove: lastMove ? { from: lastMove.from, to: lastMove.to, san: lastMove.san } : null,
    capturedPieces: getCapturedPieces(),
    moveCount: Math.ceil(chess.history().length / 2),
    isCheck: chess.in_check(), isCheckmate: chess.in_checkmate(),
    isStalemate: chess.in_stalemate(), isDraw: chess.in_draw(),
    teachMeMode, partial: !!partial,
  };
}
function getGameStatus() {
  if (chess.in_checkmate()) return 'checkmate';
  if (chess.in_stalemate()) return 'stalemate';
  if (chess.in_draw()) return 'draw';
  if (chess.in_check()) return 'check';
  return 'active';
}

// ─── Captured pieces ──────────────────────────────────────────────────────
function getCapturedPieces() {
  const counts = { w:{p:8,n:2,b:2,r:2,q:1,k:1}, b:{p:8,n:2,b:2,r:2,q:1,k:1} };
  for (const row of chess.board()) for (const sq of row) if (sq) counts[sq.color][sq.type]--;
  const expand = c => { const r=[]; for (const [t,n] of Object.entries(counts[c])) for (let i=0;i<n;i++) r.push(t); return r; };
  return { white: expand('b'), black: expand('w') };
}

// ─── Board rendering ──────────────────────────────────────────────────────
function sqName(row, col, flipped) {
  const f = flipped ? 'hgfedcba' : 'abcdefgh';
  const r = flipped ? '12345678' : '87654321';
  return f[col] + r[row];
}
function boardRowCol(row, col, flipped) {
  return flipped ? [7-row, 7-col] : [row, col];
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const boardArr = chess.board();
  const kingSquare = findKingInCheck();
  const legalSet = new Set(legalMovesForSelected.map(m => m.to));
  const legalCaptureSet = new Set(legalMovesForSelected.filter(m => m.flags.includes('c')||m.flags.includes('e')).map(m => m.to));

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const sq = sqName(row, col, boardFlipped);
      const [br, bc] = boardRowCol(row, col, boardFlipped);
      const isLight = (br + bc) % 2 === 0;
      const div = document.createElement('div');
      div.className = 'square ' + (isLight ? 'light' : 'dark');
      div.dataset.square = sq;
      if (sq === selectedSquare) div.classList.add('selected');
      else if (sq === lastMoveSquares[0]) div.classList.add('last-from');
      else if (sq === lastMoveSquares[1]) div.classList.add('last-to');
      if (kingSquare && sq === kingSquare) div.classList.add('in-check');
      if (legalSet.has(sq)) div.classList.add(legalCaptureSet.has(sq) ? 'legal-capture' : 'legal-move');
      const piece = boardArr[br][bc];
      if (piece) { const svg = PIECES_SVG[piece.color + piece.type]; if (svg) div.innerHTML = svg; }
      div.addEventListener('click', () => onSquareClick(sq));
      boardEl.appendChild(div);
    }
  }

  // Rank labels
  const rankEl = document.getElementById('rank-labels');
  rankEl.innerHTML = '';
  (boardFlipped ? ['1','2','3','4','5','6','7','8'] : ['8','7','6','5','4','3','2','1']).forEach(r => {
    const d = document.createElement('div'); d.className = 'rank-label'; d.textContent = r; rankEl.appendChild(d);
  });

  // File labels
  const fileEl = document.getElementById('file-labels');
  fileEl.innerHTML = '';
  (boardFlipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h']).forEach(f => {
    const d = document.createElement('div'); d.className = 'file-label'; d.textContent = f; fileEl.appendChild(d);
  });
}

function findKingInCheck() {
  if (!chess.in_check()) return null;
  const turn = chess.turn();
  const board = chess.board();
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = board[r][c];
    if (p && p.type === 'k' && p.color === turn) return 'abcdefgh'[c] + (8-r);
  }
  return null;
}

// ─── Board interaction ────────────────────────────────────────────────────
function onSquareClick(sq) {
  if (gameOver) return;
  if (selectedSquare) {
    const isLegalDest = legalMovesForSelected.some(m => m.to === sq);
    if (isLegalDest) {
      const isPromo = legalMovesForSelected.some(m => m.to === sq && m.flags.includes('p'));
      if (isPromo) { pendingPromotion = { from: selectedSquare, to: sq }; showPromoModal(); return; }
      executeMove(selectedSquare + sq); return;
    }
    const piece = chess.get(sq);
    if (piece && piece.color === chess.turn()) { selectSquare(sq); return; }
    selectedSquare = null; legalMovesForSelected = [];
  } else {
    const piece = chess.get(sq);
    if (piece && piece.color === chess.turn()) selectSquare(sq);
  }
  renderBoard();
}
function selectSquare(sq) {
  selectedSquare = sq;
  legalMovesForSelected = chess.moves({ square: sq, verbose: true });
  renderBoard();
}
function executeMove(moveStr) {
  const result = chess.move(moveStr);
  if (!result) return false;
  lastMoveSquares = [result.from, result.to];
  selectedSquare = null; legalMovesForSelected = [];
  renderBoard(); updateInfo(); sendStateUpdate(); checkGameOver();
  return true;
}

// ─── Promotion modal ──────────────────────────────────────────────────────
function showPromoModal() {
  const modal = document.getElementById('promo-modal');
  const choices = document.getElementById('promo-choices');
  choices.innerHTML = '';
  const turn = chess.turn();
  [['q','Queen'],['r','Rook'],['b','Bishop'],['n','Knight']].forEach(([type, label]) => {
    const btn = document.createElement('button');
    btn.className = 'promo-btn'; btn.title = label;
    btn.innerHTML = PIECES_SVG[turn + type] || label;
    btn.addEventListener('click', () => {
      modal.classList.remove('open');
      if (pendingPromotion) { executeMove(pendingPromotion.from + pendingPromotion.to + type); pendingPromotion = null; }
    });
    choices.appendChild(btn);
  });
  modal.classList.add('open');
}

// ─── Info panel ───────────────────────────────────────────────────────────
function updateInfo() {
  const turn = chess.turn();
  document.getElementById('card-white').classList.toggle('active-turn', turn === 'w');
  document.getElementById('card-black').classList.toggle('active-turn', turn === 'b');

  const dot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  dot.className = '';
  if (chess.in_checkmate()) {
    statusText.textContent = `Checkmate — ${turn === 'w' ? 'Black' : 'White'} wins!`; dot.classList.add('end');
  } else if (chess.in_stalemate()) {
    statusText.textContent = 'Stalemate — Draw'; dot.classList.add('end');
  } else if (chess.in_draw()) {
    statusText.textContent = 'Draw'; dot.classList.add('end');
  } else if (chess.in_check()) {
    statusText.textContent = `${turn === 'w' ? 'White' : 'Black'} is in check!`; dot.classList.add('check');
  } else {
    statusText.textContent = `${turn === 'w' ? 'White' : 'Black'} to move`;
  }

  const captured = getCapturedPieces();
  const toSvg = (c, t) => { const s = PIECES_SVG[c+t]; return s ? `<span style="display:inline-block;width:16px;height:16px">${s}</span>` : ''; };
  document.getElementById('captured-by-white').innerHTML = captured.white.map(t => toSvg('b',t)).join('');
  document.getElementById('captured-by-black').innerHTML = captured.black.map(t => toSvg('w',t)).join('');

  const history = chess.history();
  const histEl = document.getElementById('move-history');
  histEl.innerHTML = '';
  for (let i = 0; i < history.length; i += 2) {
    const pair = document.createElement('div'); pair.className = 'move-pair';
    const num = document.createElement('span'); num.className = 'move-num'; num.textContent = (Math.floor(i/2)+1) + '.';
    const w = document.createElement('span');
    w.className = 'move-san' + (i === history.length-1 ? ' latest' : '');
    w.textContent = history[i];
    pair.appendChild(num); pair.appendChild(w);
    if (history[i+1]) {
      const b = document.createElement('span');
      b.className = 'move-san' + (i+1 === history.length-1 ? ' latest' : '');
      b.textContent = history[i+1];
      pair.appendChild(b);
    }
    histEl.appendChild(pair);
  }
  histEl.scrollTop = histEl.scrollHeight;
}

function checkGameOver() {
  if (chess.in_checkmate() || chess.in_stalemate() || chess.in_draw()) {
    gameOver = true;
    const status = getGameStatus();
    const msgs = { checkmate: `Checkmate! ${chess.turn()==='w'?'Black':'White'} wins.`, stalemate: 'Stalemate — draw.', draw: 'Draw.' };
    sendPluginComplete(status, msgs[status] || 'Game over.');
  }
}

// ─── Controls ─────────────────────────────────────────────────────────────
function handleNewGame(fen) {
  if (fen && isValidFen(fen)) chess = new Chess(fen); else chess = new Chess();
  gameOver = false; selectedSquare = null; legalMovesForSelected = []; lastMoveSquares = [];
  renderBoard(); updateInfo();
  const dot = document.getElementById('status-dot'); dot.className = 'info';
  document.getElementById('status-text').textContent = 'New game started';
  setTimeout(() => { dot.className = ''; document.getElementById('status-text').textContent = 'White to move'; }, 2000);
  sendStateUpdate();
}
function flipBoard() {
  boardFlipped = !boardFlipped; selectedSquare = null; legalMovesForSelected = []; renderBoard();
}
function handleResign() {
  if (gameOver) return;
  const c = chess.turn() === 'w' ? 'White' : 'Black';
  const w = chess.turn() === 'w' ? 'Black' : 'White';
  gameOver = true;
  document.getElementById('status-dot').className = 'end';
  document.getElementById('status-text').textContent = `${c} resigned. ${w} wins.`;
  sendStateUpdate(); sendPluginComplete('resignation', `${c} resigned. ${w} wins.`);
}
function toggleTeachMe() {
  teachMeMode = !teachMeMode;
  const btn = document.getElementById('teach-me-btn');
  const badge = document.getElementById('teach-badge');
  const icon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;
  btn.innerHTML = icon + ` Teach Me Mode: ${teachMeMode ? 'ON' : 'OFF'}`;
  btn.classList.toggle('teach-active', teachMeMode);
  badge.classList.toggle('visible', teachMeMode);
  sendStateUpdate();
}

// ─── Plugin messaging ─────────────────────────────────────────────────────
function sendMsg(msg) { if (registeredOrigin) window.parent.postMessage(msg, registeredOrigin); }
function sendStateUpdate(partial) {
  sendMsg({ type:'STATE_UPDATE', version:1, sessionId, pluginId, state:buildChessState(partial), partial:!!partial });
}
function sendPluginComplete(reason, summary) {
  sendMsg({ type:'PLUGIN_COMPLETE', version:1, sessionId, pluginId, finalState:buildChessState(false), summary });
}
function sendToolResult(toolCallId, result, isError) {
  sendMsg({ type:'TOOL_RESULT', version:1, sessionId, pluginId, toolCallId, result, isError:!!isError });
}

// ─── Tool handlers ────────────────────────────────────────────────────────
function handleToolInvoke(msg) {
  const { toolName, toolCallId, arguments: args } = msg;
  try {
    switch (toolName) {
      case 'start_game': {
        const fen = args && args.fen ? args.fen : null;
        if (fen && !isValidFen(fen)) { sendToolResult(toolCallId, { error: 'Invalid FEN string.' }, true); return; }
        handleNewGame(fen);
        sendToolResult(toolCallId, { fen: chess.fen(), turn: 'white', status: 'active',
          message: fen ? 'Game started from custom position.' : 'New game started.' }, false);
        break;
      }
      case 'make_move': {
        const moveArg = args && args.move ? String(args.move).trim() : null;
        if (!moveArg) { sendToolResult(toolCallId, { error: 'move argument required (UCI, e.g. "e2e4").' }, true); return; }
        if (gameOver) { sendToolResult(toolCallId, { error: 'Game is over. Start a new game.' }, true); return; }
        if (!/^[a-h][1-8][a-h][1-8][qrbn]?$/i.test(moveArg)) {
          sendToolResult(toolCallId, { moveResult:'invalid_format', error:`"${moveArg}" is not valid UCI. Use "e2e4" or "e7e8q".`, fen:chess.fen() }, false); return;
        }
        const result = chess.move(moveArg.toLowerCase());
        if (!result) {
          sendToolResult(toolCallId, { moveResult:'illegal', error:`"${moveArg}" is not legal in this position.`,
            fen:chess.fen(), turn:chess.turn()==='w'?'white':'black', legalMovesCount:chess.moves().length }, false); return;
        }
        lastMoveSquares = [result.from, result.to]; selectedSquare = null; legalMovesForSelected = [];
        renderBoard(); updateInfo();
        const status = getGameStatus();
        sendStateUpdate();
        sendToolResult(toolCallId, { fen:chess.fen(), turn:chess.turn()==='w'?'white':'black',
          moveResult: status==='active'?'ok':status, san:result.san, from:result.from, to:result.to,
          captured:result.captured||null, promotion:result.promotion||null, status }, false);
        checkGameOver();
        break;
      }
      case 'get_board_state': {
        sendToolResult(toolCallId, { ...buildChessState(false), legalMovesCount: chess.moves().length }, false);
        break;
      }
      case 'get_legal_moves': {
        const sq = args && args.square ? String(args.square).toLowerCase() : null;
        if (sq && !/^[a-h][1-8]$/.test(sq)) { sendToolResult(toolCallId, { error:`Invalid square "${sq}".` }, true); return; }
        const moves = chess.moves(sq ? { square:sq, verbose:true } : { verbose:true });
        sendToolResult(toolCallId, {
          moves: moves.map(m => ({ uci:m.from+m.to+(m.promotion||''), san:m.san, from:m.from, to:m.to, piece:m.piece, flags:m.flags })),
          count: moves.length, turn: chess.turn()==='w'?'white':'black', fen: chess.fen()
        }, false);
        break;
      }
      case 'get_help': {
        const legalMoves = chess.moves({ verbose:true });
        sendToolResult(toolCallId, {
          fen: chess.fen(), turn: chess.turn()==='w'?'white':'black', status: getGameStatus(),
          moveHistory: chess.history(),
          legalMoves: legalMoves.map(m => ({ uci:m.from+m.to, san:m.san, from:m.from, to:m.to })),
          captures: legalMoves.filter(m=>m.flags.includes('c')||m.flags.includes('e')).map(m=>({ uci:m.from+m.to, san:m.san, captures:m.captured })),
          capturedPieces: getCapturedPieces(),
          moveCount: Math.ceil(chess.history().length/2),
          isCheck: chess.in_check(), teachMeMode,
          hint: 'Use this structured state for coaching. FEN is ground truth.'
        }, false);
        break;
      }
      default:
        sendToolResult(toolCallId, { error:`Unknown tool: "${toolName}"` }, true);
    }
  } catch(e) {
    console.error('[Chess] Tool error:', e);
    sendToolResult(toolCallId, { error: String(e) }, true);
    sendMsg({ type:'PLUGIN_ERROR', version:1, sessionId, pluginId, error:String(e), fatal:false });
  }
}

// ─── Message listener ─────────────────────────────────────────────────────
window.addEventListener('message', function(event) {
  if (registeredOrigin && event.origin !== registeredOrigin) return;
  const msg = event.data;
  if (!msg || typeof msg !== 'object' || msg.version !== 1) return;
  if (msg.type === 'INIT') {
    registeredOrigin = event.origin;
    sessionId = msg.sessionId; pluginId = msg.pluginId || 'chess'; conversationId = msg.conversationId;
    if (msg.restoredState && msg.restoredState.fen && isValidFen(msg.restoredState.fen)) {
      try {
        chess = new Chess(msg.restoredState.fen);
        const rs = msg.restoredState;
        if (['checkmate','stalemate','draw','resignation'].includes(rs.status)) gameOver = true;
        if (typeof rs.teachMeMode === 'boolean') teachMeMode = rs.teachMeMode;
      } catch(e) { chess = new Chess(); }
    } else { chess = new Chess(); }
    renderBoard(); updateInfo();
    sendMsg({ type:'PLUGIN_READY', version:1, sessionId, pluginId });
    return;
  }
  if (!registeredOrigin || event.origin !== registeredOrigin) return;
  if (msg.sessionId !== sessionId || msg.pluginId !== pluginId) return;
  if (msg.type === 'TOOL_INVOKE') handleToolInvoke(msg);
  else if (msg.type === 'PING') sendMsg({ type:'PONG', version:1, sessionId, pluginId });
});

// ─── Boot ─────────────────────────────────────────────────────────────────
applySqSize();
renderBoard();
updateInfo();
</script>
